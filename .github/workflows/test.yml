# ====================================
# GitHub Actions CI 配置文件
# ====================================

# 工作流名称
name: Calculator Tests

# 触发条件：当代码推送到master或dev分支时触发
on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

# 定义任务
jobs:
  # 任务名称：运行测试
  test:
    # 运行环境：最新版Ubuntu
    runs-on: ubuntu-latest

    # 步骤列表
    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 步骤2：设置Python环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 步骤3：显示Python版本
      - name: Display Python version
        run: python --version

      # 步骤4：安装依赖
      - name: Install dependencies
        working-directory: ./tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      # 步骤5：运行逻辑测试
      - name: Run logic tests
        working-directory: ./tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest test_logic.py -v

      # 步骤6：运行UI测试（如果存在）
      - name: Run UI tests
        working-directory: ./tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest test_ui.py -v || echo "UI tests not implemented yet"

      # 步骤7：生成覆盖率报告
      - name: Generate coverage report
        working-directory: ./tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --cov=../calculator --cov-report=xml --cov-report=term-missing

      # 步骤8：上传覆盖率报告
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./tests/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
